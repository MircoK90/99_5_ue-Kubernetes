# =============================================================================
#  Secret holding the MySQL root password.
#
#  The value below is the base64 encoding of "datascientest1234":
#      $ echo -n 'datascientest1234' | base64
#      ZGF0YXNjaWVudGVzdDEyMzQ=
#
#  Both containers in the Pod (MySQL + FastAPI) consume this secret as the
#  env var MYSQL_ROOT_PASSWORD — see my-deployment-eval.yml.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  labels:
    app: my-user-api
type: Opaque
data:
  # key inside the Secret -> base64-encoded password
  MYSQL_ROOT_PASSWORD: ZGF0YXNjaWVudGVzdDEyMzQ=
